name: Agent

on:
  push:
    branches: [main]
    paths: ["agent/**", ".github/workflows/agent.yml"]
  pull_request:
    paths: ["agent/**", ".github/workflows/agent.yml"]

defaults:
  run:
    working-directory: agent

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 = PVE 8 (Debian 12), 3.13 = PVE 9 (Debian 13). Both must pass.
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" httpx2

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Type check
        run: mypy app tests

      - name: Test
        run: pytest -q

  security-invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No shell execution anywhere in the repository
        run: |
          set -euo pipefail
          if grep -rn --include='*.py' -E 'shell\s*=\s*True' . ; then
            echo "::error::shell=True is banned in ProxSync"
            exit 1
          fi
          if grep -rn --include='*.py' -E '\bos\.(system|popen)\(' . ; then
            echo "::error::os.system/os.popen are banned in ProxSync"
            exit 1
          fi
          if grep -rn --include='*.py' -E 'subprocess\.(run|call|check_output|Popen)\(' app ; then
            echo "::error::use ProcessRunner (create_subprocess_exec) rather than blocking subprocess APIs"
            exit 1
          fi
          echo "No shell-execution primitives found."

      - name: rclone is invoked with the dashboard owning retries
        run: |
          set -euo pipefail
          # The dashboard counts attempts and applies the backoff; a silent rclone retry
          # loop underneath would make `sync_tasks.attempt` a lie.
          if ! grep -q '"--retries",' app/executors/rclone.py ; then
            echo "::error::rclone must be invoked with an explicit --retries"
            exit 1
          fi
          # `copy` creates a directory named after the destination; `delete` removes a
          # directory's contents. Both are the wrong verb here, and dangerously so.
          if grep -nE '"(copy|delete|purge|sync)"' app/executors/rclone.py ; then
            echo "::error::use copyto/deletefile — copy, delete, purge and sync act on directories"
            exit 1
          fi
          echo "rclone invocation constraints hold."

      - name: Shell scripts are syntactically valid
        working-directory: .
        run: |
          set -euo pipefail
          # Every shipped shell script must parse; a broken installer or maintenance script
          # only fails at the worst possible moment otherwise.
          for script in deploy/host/install-agent.sh deploy/lxc/install.sh scripts/*.sh ; do
            [ -e "$script" ] || continue
            echo "bash -n $script"
            bash -n "$script"
          done

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./deploy
