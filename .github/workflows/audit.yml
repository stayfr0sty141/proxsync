name: Dependency audit

# Supply-chain check, kept separate from the per-component test workflows so a newly
# disclosed CVE fails the scheduled run even when no code changed. Runs on every push to
# main, on PRs that touch a dependency manifest, and weekly.
on:
  push:
    branches: [main]
    paths:
      - "backend/pyproject.toml"
      - "agent/pyproject.toml"
      - "frontend/package-lock.json"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "backend/pyproject.toml"
      - "agent/pyproject.toml"
      - "frontend/package-lock.json"
      - ".github/workflows/audit.yml"
  schedule:
    # Mondays 06:00 UTC — a fresh CVE should surface at the start of the week, not on the
    # next unrelated code change.
    - cron: "0 6 * * 1"

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [backend, agent]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install the component and pip-audit
        working-directory: ${{ matrix.component }}
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit

      - name: Audit project dependencies
        working-directory: ${{ matrix.component }}
        # Resolve the local project graph without asking PyPI for the private project itself.
        run: pip-audit --strict --desc=on .

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit production dependencies
        # Only production deps gate the build: a dev-only advisory should not block a release,
        # and is caught by the scheduled full run below.
        run: npm audit --omit=dev --audit-level=high
