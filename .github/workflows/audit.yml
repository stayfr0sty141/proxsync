name: Dependency audit

# Supply-chain check, kept separate from the per-component test workflows so a newly
# disclosed CVE fails the scheduled run even when no code changed. Runs on every push to
# main, on PRs that touch a dependency manifest, and weekly.
on:
  push:
    branches: [main]
    paths:
      - "backend/pyproject.toml"
      - "agent/pyproject.toml"
      - "frontend/package-lock.json"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "backend/pyproject.toml"
      - "agent/pyproject.toml"
      - "frontend/package-lock.json"
      - ".github/workflows/audit.yml"
  schedule:
    # Mondays 06:00 UTC — a fresh CVE should surface at the start of the week, not on the
    # next unrelated code change.
    - cron: "0 6 * * 1"

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [backend, agent]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install the component and pip-audit
        working-directory: ${{ matrix.component }}
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit

      - name: Audit installed dependencies
        working-directory: ${{ matrix.component }}
        # Audits the resolved environment, so transitive dependencies are covered too.
        run: pip-audit --desc

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit production dependencies
        # Only production deps gate the build: a dev-only advisory should not block a release,
        # and is caught by the scheduled full run below.
        run: npm audit --audit-level=high
