[alembic]
script_location = alembic
prepend_sys_path = .
# Required from Alembic 1.14; omitting it emits a DeprecationWarning.
path_separator = os
# Revisions are named <rev>_<slug>.py and ordered by their numeric prefix, so the migration
# directory reads chronologically without needing to open each file.
file_template = %%(rev)s_%%(slug)s
# The URL is read from PROXSYNC_DATABASE_URL in env.py; this key stays empty on purpose so a
# stale value here can never point a migration at the wrong database.
sqlalchemy.url =

[post_write_hooks]
# `exec` rather than `console_scripts`: ruff ships a native binary and registers no
# console_scripts entry point for Alembic to import.
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
