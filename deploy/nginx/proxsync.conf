# ProxSync — nginx reverse proxy for the dashboard LXC.
#
# One origin on :443 serves both halves of the app, which is why the frontend can use
# same-origin fetches and a CSRF double-submit cookie instead of CORS:
#
#   /api/*  →  proxsync-api  (127.0.0.1:8000)   FastAPI
#   /*      →  proxsync-web  (127.0.0.1:3000)   Next.js standalone
#
# Installed to /etc/nginx/sites-available/proxsync.conf and symlinked into sites-enabled by
# deploy/lxc/install.sh, which also substitutes the server_name and certificate paths.
#
# The TLS here terminates the *browser* connection. It is unrelated to the mTLS between the
# dashboard and the Backup Agent, which lives entirely inside the API process.

# Rate-limit the login endpoint at the edge as defence in depth; the API also does
# per-(IP, username) limiting, but stopping a flood before it reaches Python is cheaper.
limit_req_zone $binary_remote_addr zone=proxsync_login:10m rate=10r/m;

# Next.js emits immutable, content-hashed assets under /_next/static.
map $sent_http_content_type $proxsync_immutable {
    default                     "";
    ~*application/javascript    "public, max-age=31536000, immutable";
    ~*text/css                  "public, max-age=31536000, immutable";
}

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    # ACME http-01 challenge, if certbot is used to replace the bootstrap self-signed cert.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else is redirected to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __SERVER_NAME__;

    ssl_certificate     /etc/proxsync/tls/web.crt;
    ssl_certificate_key /etc/proxsync/tls/web.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:ProxSyncTLS:10m;
    ssl_session_tickets off;

    # --- Security headers ---------------------------------------------------
    # HSTS is deliberately conservative (no preload, no includeSubDomains): a homelab often
    # runs other services on sibling names under the same parent domain.
    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    # The API already sets its own CSP/headers on JSON responses; this covers the HTML shell.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # vzdump archives are large, but they never traverse the browser — the agent moves them.
    # The dashboard only carries JSON and NDJSON/CSV log exports, so a modest cap is safe and
    # keeps a runaway upload from filling the container's disk.
    client_max_body_size 16m;

    # --- API ----------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The backend trusts X-Forwarded-* only from 127.0.0.1 (forwarded_allow_ips), so a
        # client cannot spoof its own address past this hop.
        proxy_read_timeout 120s;
    }

    # The SSE stream must not be buffered or timed out: it is a long-lived response that
    # dribbles events. Buffering would hold each event until a block filled; a short read
    # timeout would drop the connection between quiet periods and force a reconnect storm.
    location = /api/v1/events/stream {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # Edge rate limit on login; burst lets a legitimate retry through without a 503.
    location = /api/v1/auth/login {
        limit_req zone=proxsync_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Next.js static assets ---------------------------------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control $proxsync_immutable;
    }

    # --- Web UI -------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
